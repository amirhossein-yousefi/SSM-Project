# Jamba arm — hybrid Mamba + attention + MoE (JambaForCausalLM), scaled DOWN from the
# 52B defaults to ~124M TOTAL params. We match TOTAL (memory/optimizer fairness on a
# 40GB A100) and report ACTIVE params alongside (MoE routes only num_experts_per_tok of
# num_experts). Set num_experts: 1 for a clean dense Mamba+attention hybrid.
#
# Layer pattern over 12 layers:
#   attention iff i % attn_layer_period == attn_layer_offset  -> layers 2,6,10 (3 attn, 9 mamba)
#   MoE-MLP   iff i % expert_layer_period == expert_layer_offset -> layers 5,11 (2 MoE, 10 dense)
# Finalize intermediate_size / experts with `param_utils --check`.
arch: jamba
model:
  vocab_size: 50304
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 4         # GQA, like real Jamba
  intermediate_size: 1152        # tuned so dense+MoE MLPs fit the budget
  # Mamba sublayer
  mamba_d_state: 16
  mamba_d_conv: 4
  mamba_expand: 2
  mamba_dt_rank: auto
  # hybrid layout
  attn_layer_period: 4
  attn_layer_offset: 2
  expert_layer_period: 6
  expert_layer_offset: 5
  num_experts: 4
  num_experts_per_tok: 2
  max_position_embeddings: 1024
  tie_word_embeddings: true
  use_mamba_kernels: true        # overridden at build time by the install probe
# Expected: ~123.5M total, ~113M active.
