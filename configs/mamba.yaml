# Pure-SSM arm — Mamba-2 (Mamba2ForCausalLM), matched to ~124M params.
# Mamba-2 layers are cheaper than transformer blocks (no separate big MLP), so it needs
# MORE layers to reach the same param budget. Finalize num_hidden_layers with:
#   python -m ssm_bench.models.param_utils --check
arch: mamba
model:
  vocab_size: 50304
  hidden_size: 768
  num_hidden_layers: 24        # ~3.76M/layer * 24 + 38.6M embed ~= 128.8M (tune to match)
  state_size: 128
  expand: 2                    # inner = expand*hidden = 1536 = num_heads*head_dim
  num_heads: 24
  head_dim: 64
  n_groups: 1
  conv_kernel: 4
  chunk_size: 256
  tie_word_embeddings: true
  rms_norm: true
  residual_in_fp32: true
# HF auto-runs the torch fallback if mamba-ssm/causal-conv1d are not installed.
